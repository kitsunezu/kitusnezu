name: Eventernote Auto Deploy Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Copy deploy secrets and discover Portainer stack
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_ADMIN_TOKEN }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          PORTAINER_BASE_URL: https://portainer.kitsunet.app
          TARGET_REPO: kitsunezu/eventernote-dashboard
          TARGET_STACK_NAME: eventernote-dashboard
        run: |
          set -euo pipefail

          for name in GH_TOKEN PORTAINER_API_KEY CF_ACCESS_CLIENT_ID CF_ACCESS_CLIENT_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured"
              exit 1
            fi
          done

          printf '%s' "$PORTAINER_API_KEY" | gh secret set PORTAINER_API_KEY --repo "$TARGET_REPO"
          printf '%s' "$CF_ACCESS_CLIENT_ID" | gh secret set CF_ACCESS_CLIENT_ID --repo "$TARGET_REPO"
          printf '%s' "$CF_ACCESS_CLIENT_SECRET" | gh secret set CF_ACCESS_CLIENT_SECRET --repo "$TARGET_REPO"

          stacks_json="$(curl --fail-with-body --silent --show-error \
            --header "CF-Access-Client-ID: $CF_ACCESS_CLIENT_ID" \
            --header "CF-Access-Client-Secret: $CF_ACCESS_CLIENT_SECRET" \
            --header "X-API-Key: $PORTAINER_API_KEY" \
            "$PORTAINER_BASE_URL/api/stacks")"

          stack_id="$(jq -r --arg name "$TARGET_STACK_NAME" '.[] | select(.Name == $name) | .Id' <<<"$stacks_json" | head -n 1)"
          endpoint_id="$(jq -r --arg name "$TARGET_STACK_NAME" '.[] | select(.Name == $name) | (.EndpointId // .EndpointID // 3)' <<<"$stacks_json" | head -n 1)"

          if [ -z "$stack_id" ] || [ "$stack_id" = "null" ]; then
            echo "::error::Portainer stack '$TARGET_STACK_NAME' was not found"
            exit 1
          fi

          if [ -z "$endpoint_id" ] || [ "$endpoint_id" = "null" ]; then
            endpoint_id="3"
          fi

          echo "eventernote_stack_id=$stack_id"
          echo "eventernote_endpoint_id=$endpoint_id"

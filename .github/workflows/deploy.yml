name: Build and Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kitsunezu-portfolio
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Portainer redeploy
        run: |
          if [ -z "${{ secrets.PORTAINER_WEBHOOK_URL }}" ]; then
            echo "ERROR: PORTAINER_WEBHOOK_URL secret is not set"
            exit 1
          fi
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}")
          echo "Portainer webhook HTTP status: $STATUS"
          if [ "$STATUS" != "204" ] && [ "$STATUS" != "200" ]; then
            echo "Webhook trigger failed with status: $STATUS"
            exit 1
          fi
          echo "Portainer redeploy triggered successfully"
